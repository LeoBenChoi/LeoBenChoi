name: Generate GitHub Stats Cards

on:
  schedule:
    - cron: "0 0 * * *" # 每天 UTC 0点自动更新
  workflow_dispatch:     # 允许手动触发

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Stats Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          # 针对你的技术栈定制参数
          options: username=LeoBenChoi&show_icons=true&theme=tokyonight&count_private=true
          path: profile/stats.svg
          token: ${{ secrets.GH_TOKEN }}

      - name: Generate Languages Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          # 过滤掉杂鱼语言，突出 Go/Python/C/Java
          options: username=LeoBenChoi&layout=compact&theme=tokyonight&hide=html,css,javascript
          path: profile/langs.svg
          token: ${{ secrets.GH_TOKEN }}

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "chore: update github stats [skip ci]" || exit 0
          git push
